services:
  db:
    image: postgres:15
    container_name: tb_db
    command:
      - postgres
      - -c
      - log_checkpoints=off
    environment:
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB__USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: tb_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --no-access-log

  redis:
    image: redis:7
    container_name: tb_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
