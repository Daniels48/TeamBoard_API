<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="/static/css/forgot-password.css">
</head>

    <body>

        <div class="card">
            <h2>Forgot Password</h2>

            <p>Enter your email address and we will send you a verification code.</p>

            <input id="email" type="email" placeholder="Email">

            <button id="send-btn" onclick="sendResetCode()">Send Code</button>

            <div id="verify-block" class="hidden">
                <input id="code" type="text" placeholder="Verification Code">
                <button onclick="verifyResetCode()">Verify Code</button>
            </div>
        </div>

        <script src="/static/js/forgot-password.js"></script>
    </body>
</html>
