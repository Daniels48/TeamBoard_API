<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Board</title>
    <link rel="stylesheet" href="/static/css/board.css">
</head>

<body>

<div class="container">
    <div class="board-header">
        <div class="board-title-row">
            <div>
                <h1 id="board-title"></h1>
                <p id="board-description"></p>
                <div class="board-owner-container">
                      <div class="board-created">
                        <span class="created-icon">🕒</span>
                        <span class="icon-data-created"></span>
                    </div>
                </div>

            </div>
            <div class="board-butn">
                <div class="board-role-badge" id="board-role-badge"></div>
                <div class="board-header-actions not-creator perm-manage-members">
                    <button class="team-btn" id="members-btn" onclick="openMembersDialog()">👥 Team</button>
                </div>
            </div>

        </div>
    </div>

    <div class="container-columns">
        <div class="columns-header">
            <h2 class="h2-col">Columns</h2>
            <button class="add-column-btn perm-manage-members" id="show-column-form" onclick="createColumn()">+ Add Column</button>
             <div class="board-actions perm-edit">
                   <div id="unsaved-indicator" class="unsaved-indicator hidden">
                    <span class="dot"></span> Unsaved changes </div>
                <button id="save-positions-btn" class="save-btn hidden perm-edit" onclick="saveBoard()">Save Positions</button>
            </div>
        </div>
        <div id="columns" class="columns"></div>
    </div>

    <dialog id="members-dialog">
        <div class="members-dialog-header">
            <h2>Members</h2>
            <button onclick="closeMembersDialog()">✕</button>
        </div>
        <div id="members-content">
            <div class="owner-line">
                <strong>Owner:</strong>
                <span id="owner-name"></span>
            </div>

            <div class="members-grid">
                <div class="member-column">
                    <div class="column-title editors-title">Editors</div>
                    <div id="editors-list"></div>
                </div>

                <div class="member-column">
                    <div class="column-title viewers-title">Viewers</div>
                    <div id="viewers-list"></div>
                </div>
            </div>
        </div>
        <hr>
        <h3>Add Member</h3>
        <input id="member-username" list="users-list" placeholder="Start typing username...">
        <datalist id="users-list"></datalist>
        <select id="member-role">
            <option value="viewer">Viewer</option>
            <option value="editor">Editor</option>
        </select>

        <button onclick="addMember()">Add Member</button>

    </dialog>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/board.js"></script>

</body>
</html>
