<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Email</title>
</head>
<body style="
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:40px;
">

<div style="
    max-width:600px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
">

   <h1>TeamBoard</h1>
    <h2>Verify your email</h2>
    <p> Thank you for registering. </p>
    <p> Enter the verification code below in TeamBoard: </p>
    <div style=" margin:30px 0; text-align:center; font-size:32px; font-weight:bold; letter-spacing:8px; color:#2563eb; "> {{ code }} </div>
    <p> This code expires in 24 hours. </p>
    <p style="margin-top:30px;"> If you didn't create an account, you can safely ignore this email. </p>

</div>

</body>
</html>
