<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Profile — TeamBoard</title>
<link rel="stylesheet" href="/static/css/profile.css">
<style>
</style>
</head>

<body>

    <div class="card">

        <h2>Your Profile</h2>

        <p><b>Username:</b> <span id="username"></span></p>
        <p><b>First name:</b> <span id="f_name"></span></p>
        <p><b>Last name:</b> <span id="l_name"></span></p>
        <p><b>Email:</b> <span id="email"></span></p>



        <p>
            <b>Status:</b>
            <span id="verification-status">Not Verified ❌</span>
        </p>

        <div id="verification-block">
            <button id="verify-email-btn" onclick="sendVerificationEmail()">Send Verification Code</button>
            <input id="verification-code" type="text" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" placeholder="Enter 6-digit code"/>
            <button onclick="verifyEmail()">Verify Email</button>
        </div>


        <p><b>Role:</b> <span id="role"></span></p>
        <p><b>Created:</b> <span id="created"></span></p>
         <button onclick="updateProfile()">
            Update profile
        </button>
        <hr>
         <h3>Active sessions</h3>
        <div id="sessions-list">Loading sessions...</div>
        <button id="logout-all-btn" type="button" onclick="logoutAllSessions()">Log out from all devices</button>

    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/profile.js"></script>
</body>
</html>
